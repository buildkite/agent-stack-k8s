agents:
  queue: kubernetes
steps:
  - label: ":stopwatch: cache transfer benchmark (DEFINITIVE: ceiling + sweep + real go_mod decomposition)"
    key: cache-bench
    env:
      BUILDKITE_AGENT_CACHE_STORE_URL: s3://buildkite-agent-stack-k8s-cache
    artifact_paths:
      - "cache-bench-results.md"
      - "cache-bench-results.csv"
    image: public.ecr.aws/docker/library/golang:1.26.4-alpine@sha256:f1ddd9fe14fffc091dd98cb4bfa999f32c5fc77d2f2305ea9f0e2595c5437c14
    command:
      - apk add --quiet --no-progress bash
      - . .buildkite/steps/assume-role.sh
      - .buildkite/steps/cache-bench.sh
    plugins:
      - kubernetes:
          podSpecPatch:
            containers:
              - name: container-0
                # ~all 4 vCPUs of the m7a.xlarge -> pod owns the node (no noisy neighbours).
                # NB: NO memory *limit* here (unlike the EBS/mem-capped run). This experiment
                # deliberately uses a RAM-backed tmpfs target to remove the disk as the
                # bottleneck and find the download-path ceiling. A tmpfs is charged against
                # the cgroup, so a memory limit would just OOM the test (the ~1.86 GiB object
                # + concurrency*part_size of SDK buffers + the temp download archive must all
                # fit). The 16 GB node has ample headroom; cache-bench.sh additionally skips
                # any sweep config whose buffers wouldn't fit.
                resources:
                  requests: { cpu: "3500m", memory: "2Gi" }
                volumeMounts:
                  - name: bench-tmpfs
                    # Mounted INSIDE /root: buildkite-agent's `cache save` archives
                    # paths relative to a chroot of /root and refuses to archive
                    # anything outside it (a mount at /mnt/tmpfs fails the save with
                    # "cannot be archived from outside of chroot (/root)"). It's still
                    # a RAM-backed tmpfs, so the disk is still removed from the path.
                    mountPath: /root/tmpfs
            volumes:
              - name: bench-tmpfs
                emptyDir:
                  medium: Memory
                  # Holds the ~2 GB tmpfs cache target + its temp download archive
                  # (up to ~4 GB in flight during a restore). 10Gi leaves headroom.
                  sizeLimit: 10Gi
