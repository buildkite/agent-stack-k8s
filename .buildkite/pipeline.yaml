agents:
  queue: kubernetes
steps:
  - label: ":stopwatch: cache transfer benchmark (2GB, mem-capped)"
    key: cache-bench
    env:
      BUILDKITE_AGENT_CACHE_STORE_URL: s3://buildkite-agent-stack-k8s-cache
    artifact_paths:
      - "cache-bench-results.md"
      - "cache-bench-results.csv"
    image: public.ecr.aws/docker/library/golang:1.26.4-alpine@sha256:f1ddd9fe14fffc091dd98cb4bfa999f32c5fc77d2f2305ea9f0e2595c5437c14
    command:
      - apk add --quiet --no-progress bash
      - . .buildkite/steps/assume-role.sh
      - .buildkite/steps/cache-bench.sh
    plugins:
      - kubernetes:
          podSpecPatch:
            containers:
              - name: container-0
                # ~all 4 vCPUs of the m7a.xlarge -> pod owns the node (no noisy neighbours).
                # Memory is CAPPED (limit==request) so the OS page cache cannot hold the
                # whole 2 GB object -> measured throughput reflects real disk/network, not RAM.
                # NB: high concurrency x large part_size needs concurrency*part_size of RAM
                # (e.g. c32/p64 ~ 2 GB of SDK buffers); such configs may hit this cap.
                resources:
                  requests: { cpu: "3500m", memory: "4Gi" }
                  limits: { memory: "4Gi" }
