caches:
  - name: go_build
    cache_key:
      - agent: os
      - {agent: arch, fallbackLimit: true}
      - checksum: go.mod
    target_paths:
      - /root/.cache/go-build
  - name: go_mod
    cache_key:
      - agent: os
      - {agent: arch, fallbackLimit: true}
      - checksum: go.mod
    target_paths:
      - /root/.cache/go-mod
  - name: golangci_lint
    cache_key:
      - agent: os
      - {agent: arch, fallbackLimit: true}
      - checksum: .golangci.yaml
    target_paths:
      - /root/.cache/golangci-lint
  # A-1412 benchmark: a large (~2 GB) incompressible cache entry used only by
  # .buildkite/steps/cache-bench.sh to measure transfer throughput on a big object.
  # bench_big extracts to the gp3 EBS root volume; bench_big_tmpfs extracts to a
  # RAM-backed tmpfs so we can compare end-to-end (download + decompress + write)
  # throughput with the disk removed from the path.
  - name: bench_big
    cache_key:
      - agent: os
      - {agent: arch, fallbackLimit: true}
      - checksum: go.mod
    target_paths:
      - /root/.cache/bench-big
  - name: bench_big_tmpfs
    cache_key:
      - agent: os
      - {agent: arch, fallbackLimit: true}
      - checksum: go.mod
    target_paths:
      - /root/tmpfs/bench-big
  # A-1412 real-workload decomposition: a copy of the real go_mod cache (many
  # small files) restored to EBS vs tmpfs, to split download_s vs extract_s.
  # The leading literal key part keeps these entries distinct from the real
  # `go_mod` entry so seeding them can never clobber production cache.
  - name: go_mod_bench
    cache_key:
      - a1412-gomod-bench-v1
      - agent: os
      - {agent: arch, fallbackLimit: true}
      - checksum: go.mod
    target_paths:
      - /root/.cache/go-mod-bench
  - name: go_mod_bench_tmpfs
    cache_key:
      - a1412-gomod-bench-tmpfs-v1
      - agent: os
      - {agent: arch, fallbackLimit: true}
      - checksum: go.mod
    target_paths:
      - /root/tmpfs/go-mod-bench